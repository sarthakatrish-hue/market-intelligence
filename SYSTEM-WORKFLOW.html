<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scapia Market Intelligence — System Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #CE3E00;
    --accent-tint: #fff1eb;
    --accent-soft: #fde2d4;
    --ink: #161616;
    --muted: #6f6f6f;
    --line: #e5e5e5;
    --line-strong: #161616;
    --bg: #fafafa;
    --card: #ffffff;
    --db: #2d7a4f;
    --db-tint: #ecf5ee;
    --db-line: #a8c8b0;
    --storage: #1e5fa8;
    --storage-tint: #ebf2f9;
    --storage-line: #adc4dc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lexend Deca', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    font-size: 15px;
  }
  code, .mono {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: 0.92em;
  }

  .wrap { max-width: 1820px; margin: 0 auto; padding: 26px 32px 40px; }

  header.masthead {
    border-bottom: 2px solid var(--line-strong);
    padding-bottom: 16px;
    margin-bottom: 18px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
  }
  .masthead-left .kicker {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .masthead-left h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .masthead-right {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.06em;
    line-height: 1.7;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .tab {
    padding: 12px 24px;
    font-family: 'Lexend Deca';
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 3px solid transparent;
    transition: all 160ms ease;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .tab .tab-num {
    font-family: 'JetBrains Mono';
    font-size: 11px;
    margin-right: 8px;
    opacity: 0.7;
  }

  .main-area {
    display: flex;
    gap: 18px;
    align-items: flex-start;
  }
  .stage-container {
    flex: 1;
    min-width: 0;
    overflow-x: auto;
  }
  .stage {
    display: inline-block;
    vertical-align: top;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    position: relative;
  }
  .stage-tab { display: none; }
  .stage-tab.active { display: block; }

  /* The SVG is the diagram. Fixed size = perfect alignment forever. */
  .canvas { display: block; }
  .canvas svg.workflow {
    display: block;
    /* width and height attributes on the SVG itself match viewBox */
  }

  /* ========== SVG BLOCK STYLES — everything lives in one coordinate system ========== */

  .block-grp {
    opacity: 0.18;
    transition: opacity 300ms ease;
  }
  .block-grp.past { opacity: 0.45; }
  .block-grp.active { opacity: 1; }

  /* Background rect — default (neutral blocks) */
  .block-grp .block-bg {
    fill: #ffffff;
    stroke: #bdbdbd;
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
    transition: stroke 250ms ease, stroke-width 250ms ease, fill 250ms ease;
  }
  .block-grp.past .block-bg {
    stroke: #c9c9c9;
    stroke-dasharray: none;
  }
  .block-grp.active .block-bg {
    stroke: var(--accent);
    stroke-width: 2.5;
    stroke-dasharray: none;
  }

  /* DB blocks (green tint) */
  .block-grp.db .block-bg {
    fill: var(--db-tint);
    stroke: var(--db-line);
  }
  .block-grp.db.active .block-bg {
    stroke: var(--db);
    stroke-width: 2.5;
  }

  /* Storage blocks (blue tint) */
  .block-grp.storage .block-bg {
    fill: var(--storage-tint);
    stroke: var(--storage-line);
  }
  .block-grp.storage.active .block-bg {
    stroke: var(--storage);
    stroke-width: 2.5;
  }

  /* LLM blocks (dark) */
  .block-grp.llm .block-bg {
    fill: #161616;
    stroke: #161616;
  }
  .block-grp.llm.active .block-bg {
    stroke: var(--accent);
    stroke-width: 2.5;
  }

  /* Terminal blocks */
  .block-grp.terminal .block-bg {
    fill: #2c2c2c;
    stroke: #2c2c2c;
  }
  .block-grp.terminal.active .block-bg {
    stroke: var(--accent);
    stroke-width: 2.5;
  }

  /* Container blocks (DB wrapper) — always visible */
  .block-grp.container {
    opacity: 0.6 !important;
  }
  .block-grp.container.touched {
    opacity: 1 !important;
  }
  .block-grp.container .block-bg {
    fill: rgba(236, 245, 238, 0.5);
    stroke: var(--db-line);
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
  }
  .block-grp.container.touched .block-bg {
    stroke: var(--db);
  }

  /* Text inside blocks */
  .block-grp .t-step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    fill: var(--muted);
  }
  .block-grp .t-actor {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.8px;
    fill: var(--muted);
  }
  .block-grp .t-label {
    font-family: 'Lexend Deca', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    fill: var(--ink);
  }
  .block-grp .t-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--muted);
  }

  /* Dark blocks → light text */
  .block-grp.llm .t-label, .block-grp.terminal .t-label { fill: #ffffff; }
  .block-grp.llm .t-step-num, .block-grp.terminal .t-step-num { fill: #b8b8b8; }
  .block-grp.llm .t-actor, .block-grp.terminal .t-actor { fill: #8a8a8a; }
  .block-grp.llm .t-sub, .block-grp.terminal .t-sub { fill: #989898; }

  /* Active state — accent on text */
  .block-grp.active .t-label { fill: var(--accent); }
  .block-grp.active .t-step-num { fill: var(--accent); }
  .block-grp.db.active .t-label { fill: var(--db); }
  .block-grp.db.active .t-step-num { fill: var(--db); }
  .block-grp.storage.active .t-label { fill: var(--storage); }
  .block-grp.storage.active .t-step-num { fill: var(--storage); }

  /* Container has its own labeling */
  .block-grp.container .t-actor {
    font-size: 11px;
    letter-spacing: 2.5px;
    fill: var(--db);
    font-weight: 700;
  }

  /* ========== ARROWS ========== */
  .arrow-path {
    fill: none;
    stroke: #cccccc;
    stroke-width: 1.6;
    transition: stroke 250ms ease, stroke-width 250ms ease, opacity 250ms ease;
    opacity: 0.18;
  }
  .arrow-path.past { stroke: #a8a8a8; opacity: 0.5; }
  .arrow-path.active { stroke: var(--accent); stroke-width: 2.6; opacity: 1; }
  .arrow-path.db { stroke: #b8d0c0; }
  .arrow-path.db.past { stroke: #8aaa92; }
  .arrow-path.db.active { stroke: var(--db); }
  .arrow-path.storage { stroke: #b8c8dc; }
  .arrow-path.storage.active { stroke: var(--storage); }

  /* ========== LOOP INDICATOR ========== */
  .loop-indicator {
    opacity: 0;
    transition: opacity 350ms ease;
  }
  .loop-indicator.firing { opacity: 1; }
  .loop-ring {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-dasharray: 5 4;
    opacity: 0.55;
  }
  .loop-ball {
    filter: drop-shadow(0 0 5px rgba(206,62,0,0.6))
            drop-shadow(0 0 10px rgba(206,62,0,0.4));
  }
  .loop-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    fill: var(--accent);
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .loop-caption {
    font-family: 'Lexend Deca', sans-serif;
    font-size: 11px;
    fill: var(--muted);
    font-style: italic;
  }

  /* ========== DETAIL PANEL ========== */
  .detail {
    width: 400px;
    flex-shrink: 0;
    position: sticky;
    top: 16px;
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--accent);
    border-radius: 4px;
    max-height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px 14px;
    min-height: 0;
  }
  .detail-controls {
    flex-shrink: 0;
    padding: 14px 18px;
    background: #fafafa;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .detail-controls .ctrl-row {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .detail-controls .step-counter {
    font-family: 'JetBrains Mono';
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .detail-controls .step-counter .num { color: var(--accent); font-weight: 600; }
  .btn {
    font-family: 'Lexend Deca';
    font-size: 12.5px;
    font-weight: 500;
    padding: 8px 10px;
    border: 1px solid var(--line-strong);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    border-radius: 3px;
    transition: all 120ms ease;
    width: 100%;
  }
  .btn:hover { background: var(--ink); color: #fff; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--card); color: var(--ink); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #a33100; border-color: #a33100; color: #fff; }

  .detail .step-tag {
    font-family: 'JetBrains Mono';
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .detail h2 {
    font-family: 'Lexend Deca';
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
    line-height: 1.22;
  }
  .detail .desc {
    font-size: 13.5px;
    color: #333;
    margin-bottom: 16px;
    line-height: 1.55;
  }
  .detail-block {
    padding: 12px 14px;
    background: #fafafa;
    border-radius: 3px;
    border-left: 2px solid var(--line);
    margin-bottom: 10px;
  }
  .detail-block .h {
    font-family: 'JetBrains Mono';
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .detail-block .b {
    font-family: 'JetBrains Mono';
    font-size: 11.5px;
    color: #2a2a2a;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .detail-block .b strong {
    color: var(--accent);
    font-weight: 600;
  }
  .detail .badges {
    margin-top: 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .badge {
    font-family: 'JetBrains Mono';
    font-size: 9.5px;
    padding: 3px 9px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .badge.accent {
    background: var(--accent-tint);
    color: var(--accent);
    border-color: var(--accent-soft);
    font-weight: 600;
  }
  .badge.db {
    background: var(--db-tint);
    color: var(--db);
    border-color: var(--db-line);
  }
  .badge.llm {
    background: var(--ink);
    color: var(--accent);
    border-color: var(--ink);
  }

  footer.foot {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 1280px) {
    .main-area { flex-direction: column; }
    .detail { width: 100%; position: relative; max-height: none; }
  }
</style>
</head>

<div class="wrap">

<header class="masthead">

</header>

<div class="tabs">

  <button class="tab" data-stage="query"><span class="tab-num">③</span>Query</button>

      </div>

  <div class="detail" id="detail">

</div>

<footer class="foot">

</footer>

</div>

/* =========================================================================
   PURE-SVG RENDERING — single coordinate system, alignment guaranteed
   ========================================================================= */

const SVG_NS = 'http://www.w3.org/2000/svg';
const state = { stage: 'ingest', step: 0 };

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

/* Edge-aware arrow routing — both endpoints in viewBox coords */
function arrowPath(src, dst) {
  const srcCx = src.x + src.w / 2;
  const srcCy = src.y + src.h / 2;
  const dstCx = dst.x + dst.w / 2;
  const dstCy = dst.y + dst.h / 2;
  const dxCenter = dstCx - srcCx;
  const dyCenter = dstCy - srcCy;

  let exitX, exitY, entryX, entryY, exitDir, entryDir;

  if (Math.abs(dxCenter) > Math.abs(dyCenter) * 1.2) {
    if (dxCenter > 0) {
      exitX = src.x + src.w; exitY = srcCy; exitDir = 'right';
      entryX = dst.x;        entryY = dstCy; entryDir = 'left';
    } else {
      exitX = src.x;          exitY = srcCy; exitDir = 'left';
      entryX = dst.x + dst.w; entryY = dstCy; entryDir = 'right';
    }
  } else {
    if (dyCenter > 0) {
      exitX = srcCx; exitY = src.y + src.h; exitDir = 'bottom';
      entryX = dstCx; entryY = dst.y;        entryDir = 'top';
    } else {
      exitX = srcCx; exitY = src.y;          exitDir = 'top';
      entryX = dstCx; entryY = dst.y + dst.h; entryDir = 'bottom';
    }
  }

  // Capped reach: smooth for short gaps, contained for long ones
  let gap;
  if (exitDir === 'right' || exitDir === 'left') gap = Math.abs(entryX - exitX);
  else gap = Math.abs(entryY - exitY);
  const reach = Math.max(18, Math.min(55, gap * 0.4));

  let cp1x = exitX, cp1y = exitY;
  let cp2x = entryX, cp2y = entryY;
  if (exitDir === 'right')  cp1x += reach;
  if (exitDir === 'left')   cp1x -= reach;
  if (exitDir === 'bottom') cp1y += reach;
  if (exitDir === 'top')    cp1y -= reach;
  if (entryDir === 'right')  cp2x += reach;
  if (entryDir === 'left')   cp2x -= reach;
  if (entryDir === 'bottom') cp2y += reach;
  if (entryDir === 'top')    cp2y -= reach;

  // Pull endpoint back so the arrowhead tip sits cleanly outside the block
  const arrowBack = 6;
  const tx = entryX - cp2x;
  const ty = entryY - cp2y;
  const len = Math.hypot(tx, ty) || 1;
  const ex = entryX - (tx / len) * arrowBack;
  const ey = entryY - (ty / len) * arrowBack;

  return `M ${exitX},${exitY} C ${cp1x},${cp1y} ${cp2x},${cp2y} ${ex},${ey}`;
}

function markerFor(stageKey, kind, active) {
  if (kind === 'db') return `url(#arr-${stageKey}-db${active ? '-active' : ''})`;
  if (kind === 'storage') return `url(#arr-${stageKey}-storage${active ? '-active' : ''})`;
  return `url(#arr-${stageKey}${active ? '-active' : ''})`;
}

/* Render a block as an SVG <g> with translated rect + text inside */
function renderBlock(svg, b, stageKey) {
  const g = svgEl('g', {
    class: `block-grp ${b.kind || ''}`.trim(),
    id: `${stageKey}-${b.id}`,
  });

  // Background rect
  g.appendChild(svgEl('rect', {
    x: b.x, y: b.y, width: b.w, height: b.h,
    rx: 5, class: 'block-bg',
  }));

  const padX = 14;
  const isContainer = b.kind === 'container';

  // Containers only show the "DATABASE" label at top-left of the rect
  if (isContainer) {
    if (b.actor) {
      const t = svgEl('text', {
        x: b.x + padX, y: b.y + 22, class: 't-actor',
      });
      t.textContent = b.actor;
      g.appendChild(t);
    }
    svg.appendChild(g);
    return;
  }

  let cursorY = b.y + 18;

  // Step number
  if (b.stepNum) {
    const t = svgEl('text', {
      x: b.x + padX, y: cursorY, class: 't-step-num',
    });
    t.textContent = b.stepNum;
    g.appendChild(t);
    cursorY += 16;
  }

  // Actor
  if (b.actor) {
    const t = svgEl('text', {
      x: b.x + padX, y: cursorY, class: 't-actor',
    });
    t.textContent = b.actor;
    g.appendChild(t);
    cursorY += 18;
  }

  // Label
  if (b.label) {
    const t = svgEl('text', {
      x: b.x + padX, y: cursorY, class: 't-label',
    });
    t.textContent = b.label;
    g.appendChild(t);
    cursorY += 20;
  }

  // Sub — multi-line via tspan
  if (b.sub) {
    const lines = b.sub.split('\n');
    const t = svgEl('text', {
      x: b.x + padX, y: cursorY, class: 't-sub',
    });
    lines.forEach((line, i) => {
      const tspan = svgEl('tspan', { x: b.x + padX });
      if (i > 0) tspan.setAttribute('dy', 13);
      tspan.textContent = line || ' '; // preserve blank lines
      t.appendChild(tspan);
    });
    g.appendChild(t);
  }

  svg.appendChild(g);
}

function buildStage(stageKey) {
  const stage = STAGES[stageKey];
  const canvas = document.getElementById(`canvas-${stageKey}`);

  const svg = svgEl('svg', {
    class: 'workflow',
    viewBox: `0 0 ${stage.canvasW} ${stage.canvasH}`,
    width: stage.canvasW,
    height: stage.canvasH,
    xmlns: SVG_NS,
  });

  // Defs: arrow markers
  const defs = svgEl('defs');
  defs.innerHTML = `
    <marker id="arr-${stageKey}" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#cccccc"/>
    </marker>
    <marker id="arr-${stageKey}-active" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#CE3E00"/>
    </marker>
    <marker id="arr-${stageKey}-db" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#b8d0c0"/>
    </marker>
    <marker id="arr-${stageKey}-db-active" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#2d7a4f"/>
    </marker>
    <marker id="arr-${stageKey}-storage" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#b8c8dc"/>
    </marker>
    <marker id="arr-${stageKey}-storage-active" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#1e5fa8"/>
    </marker>
  `;
  svg.appendChild(defs);

  // Render container blocks FIRST so they sit behind
  stage.blocks.filter(b => b.kind === 'container').forEach(b => renderBlock(svg, b, stageKey));

  // Arrows next (behind regular blocks)
  stage.arrows.forEach(arr => {
    const src = stage.blocks.find(b => b.id === arr.from);
    const dst = stage.blocks.find(b => b.id === arr.to);
    if (!src || !dst) return;

    const d = arrowPath(src, dst);
    const arrowId = `${arr.from}__${arr.to}`;

    const path = svgEl('path', {
      d,
      class: `arrow-path ${arr.kind || ''}`.trim(),
      id: `path-${stageKey}-${arrowId}`,
      'marker-end': markerFor(stageKey, arr.kind, false),
    });
    svg.appendChild(path);
  });

  // Regular blocks on top
  stage.blocks.filter(b => b.kind !== 'container').forEach(b => renderBlock(svg, b, stageKey));

  // Loop indicator for ingest only
  if (stageKey === 'ingest') {
    const loopG = svgEl('g', {
      class: 'loop-indicator',
      id: `loop-indicator-${stageKey}`,
    });

    const cx = 1080, cy = 845, rx = 130, ry = 60;
    const ellipsePath = `M ${cx - rx},${cy} a ${rx},${ry} 0 1,0 ${rx * 2},0 a ${rx},${ry} 0 1,0 ${-rx * 2},0`;

    loopG.appendChild(svgEl('ellipse', {
      cx, cy, rx, ry, class: 'loop-ring',
    }));

    for (let i = 0; i < 2; i++) {
      const ball = svgEl('circle', {
        r: 7, class: 'loop-ball', fill: '#CE3E00',
        cx: cx - rx, cy,
      });
      const anim = svgEl('animateMotion', {
        dur: '2.4s', repeatCount: 'indefinite',
        begin: i === 0 ? '0s' : '-1.2s',
        path: ellipsePath,
      });
      ball.appendChild(anim);
      loopG.appendChild(ball);
    }

    const label = svgEl('text', {
      x: cx, y: cy + 5, 'text-anchor': 'middle', class: 'loop-label',
    });
    label.textContent = '↻ × 5–15';
    loopG.appendChild(label);

    const caption = svgEl('text', {
      x: cx, y: cy + ry + 22, 'text-anchor': 'middle', class: 'loop-caption',
    });
    caption.textContent = 'agent iterates · read → think → write';
    loopG.appendChild(caption);

    svg.appendChild(loopG);
  }

  canvas.appendChild(svg);
}

function renderState() {
  const stage = STAGES[state.stage];
  const step = stage.steps[state.step];
  const activeBlocks = new Set(step.blocks);
  const activeArrows = new Set(step.arrows.map(a => `${a[0]}__${a[1]}`));

  const pastBlocks = new Set();
  const pastArrows = new Set();
  for (let i = 0; i < state.step; i++) {
    stage.steps[i].blocks.forEach(b => pastBlocks.add(b));
    stage.steps[i].arrows.forEach(a => pastArrows.add(`${a[0]}__${a[1]}`));
  }

  // Block states (containers get "touched" treatment)
  stage.blocks.forEach(b => {
    const el = document.getElementById(`${state.stage}-${b.id}`);
    if (!el) return;
    if (b.kind === 'container') {
      el.classList.toggle('touched', activeBlocks.has(b.id));
      return;
    }
    el.classList.remove('active', 'past');
    if (activeBlocks.has(b.id)) el.classList.add('active');
    else if (pastBlocks.has(b.id)) el.classList.add('past');
  });

  // Arrow states
  stage.arrows.forEach(a => {
    const key = `${a.from}__${a.to}`;
    const path = document.getElementById(`path-${state.stage}-${key}`);
    if (!path) return;
    path.classList.remove('active', 'past');
    let active = false;
    if (activeArrows.has(key)) { path.classList.add('active'); active = true; }
    else if (pastArrows.has(key)) path.classList.add('past');
    path.setAttribute('marker-end', markerFor(state.stage, a.kind, active));
  });

  // Loop indicator
  const loopInd = document.getElementById(`loop-indicator-${state.stage}`);
  if (loopInd) loopInd.classList.toggle('firing', !!step.showLoop);

  // Detail panel
  document.getElementById('detail-tag').textContent =
    `STEP ${String(state.step + 1).padStart(2,'0')} · ${state.stage.toUpperCase()}`;
  document.getElementById('detail-title').textContent = step.title;
  document.getElementById('detail-desc').innerHTML = step.desc;
  document.getElementById('detail-hld').innerHTML = step.hld;
  document.getElementById('detail-lld').innerHTML = step.lld;

  const badgesEl = document.getElementById('detail-badges');
  badgesEl.innerHTML = '';
  (step.badges || []).forEach(b => {
    const span = document.createElement('span');
    let cls = 'badge';
    const lower = b.toLowerCase();
    if (lower.includes('fan-out') || lower.includes('fan-in') || lower.includes('aggregation') || lower.includes('signal split')) cls += ' accent';
    else if (lower.includes('llm') || lower.includes('sonnet') || lower.includes('haiku')) cls += ' llm';
    else if (lower.includes('db') || lower.includes('table') || lower.includes('view')) cls += ' db';
    span.className = cls;
    span.textContent = b;
    badgesEl.appendChild(span);
  });

  document.getElementById('step-current').textContent = String(state.step + 1).padStart(2,'0');
  document.getElementById('step-total').textContent = String(stage.steps.length).padStart(2,'0');
  document.getElementById('btn-prev').disabled = state.step === 0;
  document.getElementById('btn-next').disabled = state.step === stage.steps.length - 1;

  // Scroll active block into view
  const firstActive = step.blocks[0];
  if (firstActive) {
    const el = document.getElementById(`${state.stage}-${firstActive}`);
    if (el && el.scrollIntoView) {
      const rect = el.getBoundingClientRect();
      if (rect.top < 120 || rect.bottom > window.innerHeight - 100) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }
}

function switchStage(stageKey) {
  state.stage = stageKey;
  state.step = 0;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.stage === stageKey));
  document.querySelectorAll('.stage-tab').forEach(s => s.classList.toggle('active', s.dataset.stage === stageKey));
  renderState();
}

['ingest','content','query'].forEach(buildStage);

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchStage(t.dataset.stage));
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (state.step > 0) { state.step--; renderState(); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  const stage = STAGES[state.stage];
  if (state.step < stage.steps.length - 1) { state.step++; renderState(); }
});
document.getElementById('btn-reset').addEventListener('click', () => {
  state.step = 0; renderState();
});

let playInterval = null;
document.getElementById('btn-play').addEventListener('click', () => {
  if (playInterval) {
    clearInterval(playInterval); playInterval = null;
    document.getElementById('btn-play').textContent = '▶ Play';
    return;
  }
  document.getElementById('btn-play').textContent = '■ Stop';
  playInterval = setInterval(() => {
    const stage = STAGES[state.stage];
    if (state.step < stage.steps.length - 1) { state.step++; renderState(); }
    else {
      clearInterval(playInterval); playInterval = null;
      document.getElementById('btn-play').textContent = '▶ Play';
    }
  }, 3000);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault(); document.getElementById('btn-next').click();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault(); document.getElementById('btn-prev').click();
  }
});

renderState();
</script>
</body>
</html>
